worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # ── Info-leak response headers (hint to players) ──────────────────────────
    add_header X-Powered-By    "CipherOps-Nginx/1.24" always;
    add_header X-Backend-Port  "8080"                 always;
    add_header X-Frame-Options "SAMEORIGIN"           always;

    # ── Public reverse proxy (:80) ─────────────────────────────────────────────
    server {
        listen      80;
        server_name _;

        # Frontend – Next.js
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        # ─────────────────────────────────────────────────────────────────────
        # MISCONFIGURATION: /api/v1/internal/* is supposed to be private.
        # A proper config would have:
        #     location /api/v1/internal/ { deny all; }
        # placed ABOVE this block. Without it, all internal routes are
        # reachable by external clients through this proxy.
        # ─────────────────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass         http://backend:8080/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }
}
